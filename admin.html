<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vega Mühendislik - Admin Paneli</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f0f2f5; 
            color: #333; 
            margin: 0; 
            display: flex;
            flex-direction: column; /* İçerik aşağı doğru uzayabilsin */
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .admin-box { 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
            border-top: 5px solid #003366;
        }

        h2, h3 { color: #003366; text-align: center; font-weight: 600; }
        h3 { margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }

        label { font-size: 0.9em; color: #666; font-weight: 600; display: block; margin-bottom: 5px; }

        input, textarea { 
            width: 100%; margin-bottom: 20px; padding: 12px; 
            border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; 
        }

        button { 
            background: #003366; color: white; border: none; padding: 15px; 
            border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; 
        }

        button:hover { background: #0056b3; }

        /* Ürün Listesi Alanı */
        .urun-item {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 0.9em;
        }
        
        .sil-btn { color: #dc3545; text-decoration: none; font-weight: bold; }
        .sil-btn:hover { text-decoration: underline; }

        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Ürün Yönetim Paneli</h2>
        
        <form action="/admin/ekle" method="post">
    <input type="text" name="ad" placeholder="Ürün Adı" required>
    <input type="text" name="marka" placeholder="Marka (Örn: Daikin, ECA)" required>
    <input type="text" name="kategori" placeholder="Kategori (Örn: VRF, Kombi)" required>
    <textarea name="aciklama" placeholder="Açıklama"></textarea>
    <input type="text" name="resim_yolu" placeholder="Resim Linki">
    <button type="submit">Ürünü Sisteme Ekle</button>
</form>

        <h3>Mevcut Ürünler</h3>
        <div style="max-height: 250px; overflow-y: auto; padding-right: 10px;">
            {% for urun in urunler %}
            <div class="urun-item">
                <span>{{ urun.ad }}</span>
                <a href="/admin/sil/{{ urun.id }}" 
                   onclick="return confirm('Bu ürünü silmek istediğinize emin misiniz?')" 
                   class="sil-btn">Sil</a>
            </div>
            {% endfor %}
        </div>

        <a href="/" class="back-link">← Siteye Geri Dön</a>
    </div>

</body>
</html>
